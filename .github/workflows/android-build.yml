name: Build Android AAB

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NODE_OPTIONS: --max_old_space_size=4096

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ✅ Setup Node 20 FIRST before anything else
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ✅ Setup Java before installs
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ✅ Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ✅ Clean install
      - name: Install dependencies
        run: npm ci

      # ✅ Create env file
      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env


      # ✅ Debug which Node Gradle will use (remove after confirming fix)
      - name: Debug Node path
        run: |
          which node
          node --version
          echo $PATH

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Verify keystore exists
        run: ls -la android/app/upload-keystore.jks

      # ✅ Explicitly pass node binary so Gradle uses Node 20, not system default
      - name: Build AAB
        env:
          MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.MYAPP_UPLOAD_STORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.MYAPP_UPLOAD_KEY_ALIAS }}
          MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.MYAPP_UPLOAD_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          NODE=$(which node)
          echo "Using node: $NODE ($($NODE --version))"
          ./gradlew bundleRelease \
            -Pnode.path=$NODE \
            --no-daemon \
            --stacktrace

      # ✅ Upload AAB
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      # ✅ Build APK
      - name: Build APK
        env:
          MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.MYAPP_UPLOAD_STORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.MYAPP_UPLOAD_KEY_ALIAS }}
          MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.MYAPP_UPLOAD_KEY_PASSWORD }}
        run: |
          cd android
          NODE=$(which node)
          ./gradlew assembleRelease \
            -Pnode.path=$NODE \
            --no-daemon \
            --stacktrace

      # ✅ Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk